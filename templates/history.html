<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سجل التحويلات — VoiceForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="manifest" href="/static/manifest.json" />
</head>
<body>

  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3a9 9 0 0 1 9 9 9 9 0 0 1-9 9A9 9 0 0 1 3 12a9 9 0 0 1 9-9zm0 2a7 7 0 1 0 0 14A7 7 0 0 0 12 5zm-1 3h2v8h-2zm-4 2h2v4H7zm8 0h2v4h-2z"/>
        </svg>
      </span>
      VoiceForge
    </a>
    <div class="topbar-right">
      <a href="/" class="btn btn-ghost" data-i18n="btn_convert">🎙️ التحويل</a>
      <a href="/profile" class="btn btn-ghost" data-i18n="btn_profile">👤 الملف</a>
      <button class="btn btn-icon btn-ghost" id="themeToggle" type="button">🌙</button>
      <button class="btn btn-icon btn-ghost" id="langToggle" type="button" title="Switch language">🌐</button>
      <button class="btn btn-ghost" id="logoutBtn" type="button" data-i18n="nav_logout">خروج</button>
    </div>
  </header>

  <main class="container page-wrap">

    <section class="hero" style="padding-block-end: 1rem">
      <h1>📋 <span data-i18n="history_title">سجل</span> <span class="grad" data-i18n="history_title_grad">التحويلات</span></h1>
      <p data-i18n="history_sub">جميع عمليات تحويل النص إلى صوت التي أجريتها.</p>
    </section>

    <div class="card">
      <div class="card-body">

        <!-- Empty state -->
        <div id="emptyState" class="empty-state" style="display:none">
          <div class="empty-icon">🎙️</div>
          <p data-i18n="history_empty_title">لا توجد تحويلات بعد.</p>
          <a href="/" class="btn btn-primary" data-i18n="history_empty_btn">ابدأ أول تحويل</a>
        </div>

        <!-- Loading -->
        <div id="loadingState" class="empty-state">
          <span class="spinner"><span></span><span></span><span></span><span></span><span></span></span>
          <p style="margin-top:1rem" data-i18n="loading">جارٍ التحميل…</p>
        </div>

        <!-- Table -->
        <div id="historyTableWrap" style="display:none">
          <table class="history-table" aria-label="سجل التحويلات">
            <thead>
              <tr>
                <th data-i18n="history_col_text">النص</th>
                <th data-i18n="history_col_voice">الصوت</th>
                <th data-i18n="history_col_settings">الإعدادات</th>
                <th data-i18n="history_col_date">التاريخ</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination-row" style="display:none">
          <button class="btn btn-ghost" id="prevBtn" disabled
                  data-i18n="btn_prev">← السابق</button>
          <span id="pageInfo" class="page-info">الصفحة 1</span>
          <button class="btn btn-ghost" id="nextBtn"
                  data-i18n="btn_next">التالي →</button>
        </div>

      </div>
    </div>

  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/animations.js"></script>
  <script src="/static/js/history.js"></script>
</body>
</html>
